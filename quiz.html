<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>리더십 REINVENT 2.0 퀴즈</title>
<style>
  :root{
    --lg-red:#A50034;
    --lg-red-dark:#78002a;
    --lg-red-light:#fdeef2;
    --gray-900:#1a1a1a;
    --gray-600:#5f5f5f;
    --gray-300:#e2e2e2;
    --gray-100:#f7f7f8;
    --green:#1f8a4c;
    --red-wrong:#c0392b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Noto Sans KR","Malgun Gothic",sans-serif;
    background:var(--gray-100);
    color:var(--gray-900);
    display:flex;
    justify-content:center;
    padding:24px 12px;
    min-height:100vh;
  }
  .card{
    width:100%;
    max-width:560px;
    background:#fff;
    border-radius:16px;
    box-shadow:0 4px 24px rgba(0,0,0,0.06);
    padding:32px 28px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:20px;
  }
  .brand-mark{
    width:10px;height:10px;border-radius:50%;
    background:var(--lg-red);
  }
  .brand-name{
    font-size:13px;
    color:var(--gray-600);
    letter-spacing:0.05em;
    font-weight:700;
  }
  h1{
    font-size:22px;
    margin:0 0 8px;
  }
  p.desc{
    color:var(--gray-600);
    font-size:14px;
    line-height:1.6;
    margin:0 0 24px;
  }
  label{
    display:block;
    font-size:13px;
    font-weight:700;
    color:var(--gray-900);
    margin:16px 0 6px;
  }
  input[type=text]{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--gray-300);
    border-radius:10px;
    font-size:15px;
    font-family:inherit;
  }
  input[type=text]:focus{
    outline:none;
    border-color:var(--lg-red);
  }
  textarea{
    width:100%;
    padding:12px 14px;
    border:1px solid var(--gray-300);
    border-radius:10px;
    font-size:14px;
    font-family:inherit;
    line-height:1.6;
    resize:vertical;
    min-height:100px;
  }
  textarea:focus{
    outline:none;
    border-color:var(--lg-red);
  }
  .char-count{
    text-align:right;
    font-size:12px;
    color:var(--gray-600);
    margin-top:4px;
  }
  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
  }
  .btn-primary{
    margin-top:24px;
    width:100%;
    background:var(--lg-red);
    color:#fff;
    font-size:16px;
    font-weight:700;
    padding:14px;
    border-radius:10px;
    transition:background 0.15s;
  }
  .btn-primary:hover{background:var(--lg-red-dark);}
  .btn-primary:disabled{background:var(--gray-300); cursor:not-allowed;}

  .progress-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:24px;
  }
  .progress-bar{
    flex:1;
    height:6px;
    background:var(--gray-300);
    border-radius:99px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--lg-red);
    border-radius:99px;
    transition:width 0.3s ease;
  }
  .progress-label{
    font-size:12px;
    color:var(--gray-600);
    font-weight:700;
    white-space:nowrap;
  }

  .question-block{
    padding-bottom:24px;
    margin-bottom:24px;
    border-bottom:1px solid var(--gray-300);
  }
  .question-block:last-child{
    border-bottom:none;
    margin-bottom:0;
    padding-bottom:0;
  }
  .q-number{
    display:inline-block;
    font-size:12px;
    font-weight:700;
    color:var(--lg-red);
    background:var(--lg-red-light);
    padding:2px 10px;
    border-radius:99px;
    margin-bottom:10px;
  }

  .q-title{
    font-size:18px;
    font-weight:700;
    line-height:1.5;
    margin:0 0 20px;
  }
  .choice{
    display:block;
    width:100%;
    text-align:left;
    padding:14px 16px;
    margin-bottom:10px;
    border:1.5px solid var(--gray-300);
    border-radius:10px;
    background:#fff;
    font-size:15px;
    color:var(--gray-900);
    transition:all 0.12s;
  }
  .choice:hover{border-color:var(--lg-red);}
  .choice.selected{
    border-color:var(--lg-red);
    background:var(--lg-red-light);
    font-weight:700;
  }

  .nav-row{
    display:flex;
    gap:10px;
    margin-top:24px;
  }
  .btn-ghost{
    flex:0 0 auto;
    background:var(--gray-100);
    color:var(--gray-600);
    font-size:15px;
    font-weight:700;
    padding:14px 18px;
    border-radius:10px;
  }
  .btn-ghost:disabled{opacity:0.4; cursor:not-allowed;}
  .nav-row .btn-primary{margin-top:0;}

  /* result */
  .score-hero{
    text-align:center;
    padding:12px 0 24px;
    border-bottom:1px solid var(--gray-300);
    margin-bottom:20px;
  }
  .score-num{
    font-size:48px;
    font-weight:800;
    color:var(--lg-red);
    line-height:1;
  }
  .score-sub{
    font-size:13px;
    color:var(--gray-600);
    margin-top:8px;
  }
  .review-item{
    padding:16px 0;
    border-bottom:1px solid var(--gray-300);
  }
  .review-item:last-child{border-bottom:none;}
  .review-tag{
    display:inline-block;
    font-size:12px;
    font-weight:700;
    padding:2px 8px;
    border-radius:99px;
    margin-bottom:8px;
  }
  .tag-correct{background:#e8f6ee; color:var(--green);}
  .tag-wrong{background:#fdecea; color:var(--red-wrong);}
  .review-q{
    font-size:14px;
    font-weight:700;
    margin-bottom:8px;
  }
  .review-block{
    font-size:13px;
    color:var(--gray-600);
    line-height:1.7;
  }
  .review-block b{color:var(--gray-900);}
  .review-reason{
    margin-top:8px;
    padding:12px 14px;
    background:var(--gray-100);
    border-radius:8px;
    white-space:pre-wrap;
    font-size:13px;
  }

  .coupon-banner{
    color:var(--gray-900);
    font-size:15px;
    line-height:1.8;
    text-align:center;
    padding:4px 4px 20px;
    margin-bottom:12px;
  }

  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:100;
  }
  .modal-box{
    width:100%;
    max-width:460px;
    background:#fff;
    border-radius:16px;
    padding:36px 32px;
    box-shadow:0 12px 40px rgba(0,0,0,0.2);
    position:relative;
    z-index:2;
  }
  #confetti-canvas{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
  }

  .hidden{display:none;}
  .loading-dot{
    font-size:13px;
    color:var(--gray-600);
    text-align:center;
    margin-top:14px;
  }
</style>
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-mark"></div>
    <div class="brand-name">리더십 REINVENT 2.0</div>
  </div>

  <!-- 1) 시작 화면 -->
  <div id="screen-start">
    <h1 id="quiz-title">리더십 REINVENT 2.0 이해도 퀴즈</h1>
    <p class="desc" id="quiz-desc">리더십 REINVENT 2.0 과정 내용을 잘 이해하셨는지 확인하는 퀴즈입니다. 각 문항마다 답을 고르고, 그렇게 생각한 이유를 함께 작성해주세요. 이름과 사번을 입력한 후 시작해주세요.</p>

    <label for="input-name">이름</label>
    <input type="text" id="input-name" placeholder="예: 홍길동">

    <label for="input-empno">사번</label>
    <input type="text" id="input-empno" placeholder="예: 20261234">

    <button class="btn-primary" id="btn-start">퀴즈 시작하기</button>
  </div>

  <!-- 2) 문제 화면 (3문항 한 페이지, 스크롤) -->
  <div id="screen-quiz" class="hidden">
    <div id="question-list"></div>
    <button class="btn-primary" id="btn-submit">제출하기</button>
  </div>

  <!-- 3) 결과 화면 -->
  <div id="screen-result" class="hidden">
    <div class="score-hero">
      <div class="score-num" id="score-num">0</div>
      <div class="score-sub" id="score-sub">점 / 100점 만점</div>
    </div>

    <div id="review-list"></div>
    <div class="loading-dot" id="save-status"></div>
  </div>

</div>

<!-- 쿠폰 번호 입력 팝업 (만점 시에만 표시) -->
<div id="coupon-modal-overlay" class="modal-overlay hidden">
  <canvas id="confetti-canvas"></canvas>
  <div class="modal-box">
    <div class="coupon-banner">
      🎉 축하합니다! 🎉<br>
      정답을 모두 맞히셨습니다! 😊<br>
      정답자 대상으로 커피 쿠폰을 발송해 드릴 예정입니다. ☕<br>
      쿠폰 발송을 위해 휴대폰 번호를 입력해 주시기 바랍니다.<br>
      ※ 커피 쿠폰은 과정 종료일 이후 순차 발송될 예정입니다.
    </div>
    <label for="input-phone">휴대폰 번호 <span style="color:var(--lg-red)">*필수</span></label>
    <input type="text" id="input-phone" placeholder="예: 010-1234-5678">
    <button class="btn-primary" id="btn-coupon-submit">제출 완료하고 쿠폰 받기</button>
  </div>
</div>

<script>
/* =========================================================
   ① 문제 편집 영역 — 아래 QUESTIONS 배열만 수정하면 됩니다. (문항 3개)
   - text: 문제
   - choices: 보기 배열
   - answerIndex: 정답 보기의 index (0부터 시작)
   ========================================================= */
const QUESTIONS = [
  {
    text: "1. 이번 교육 과정의 핵심 목표로 가장 알맞은 것은?",
    choices: ["현업 적용 역량 강화", "단순 이론 암기", "출석 확인", "행정 서류 작성"],
    answerIndex: 0
  },
  {
    text: "2. 실습 시 반드시 지켜야 할 안전 수칙은?",
    choices: ["개인 판단으로 생략 가능", "담당 강사 안내에 따름", "임의로 순서 변경", "타인에게 위임"],
    answerIndex: 1
  },
  {
    text: "3. 과정 수료 기준으로 옳은 것은?",
    choices: ["출석과 관계없이 자동 수료", "출석률 및 평가 기준 충족 시 수료", "설문 참여만으로 수료", "신청만 하면 수료"],
    answerIndex: 1
  }
];

/* =========================================================
   ② 구글 시트 저장 연동 — Apps Script 배포 후 웹앱 URL만 넣으면 됩니다.
   ========================================================= */
const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxPLEuEq83qOqfxF5NBdsVxlN2SBy_Ha4t063qmneLQADoQeWrWuiXMsE1hf_Nngn0mXw/exec";

/* ========================================================= */

let answers = new Array(QUESTIONS.length).fill(null);
let reasons = new Array(QUESTIONS.length).fill('');
let userInfo = { name: "", empno: "" };
let finalScore = 0;
let finalCorrectCount = 0;

const screenStart = document.getElementById('screen-start');
const screenQuiz = document.getElementById('screen-quiz');
const screenResult = document.getElementById('screen-result');

document.getElementById('btn-start').addEventListener('click', () => {
  const name = document.getElementById('input-name').value.trim();
  const empno = document.getElementById('input-empno').value.trim();
  if(!name || !empno){
    alert('이름과 사번을 모두 입력해주세요.');
    return;
  }
  userInfo = { name, empno };
  screenStart.classList.add('hidden');
  screenQuiz.classList.remove('hidden');
  renderAllQuestions();
});

function renderAllQuestions(){
  const listWrap = document.getElementById('question-list');
  listWrap.innerHTML = '';

  QUESTIONS.forEach((q, qIdx) => {
    const block = document.createElement('div');
    block.className = 'question-block';

    const choicesHtml = q.choices.map((choiceText, cIdx) => `
      <button type="button" class="choice" data-q="${qIdx}" data-c="${cIdx}">${choiceText}</button>
    `).join('');

    block.innerHTML = `
      <span class="q-number">문항 ${qIdx + 1} / ${QUESTIONS.length}</span>
      <div class="q-title">${q.text}</div>
      <div class="q-choices" id="q-choices-${qIdx}">${choicesHtml}</div>
      <label for="input-reason-${qIdx}">그렇게 생각한 이유 <span style="color:var(--lg-red)">*필수</span></label>
      <textarea id="input-reason-${qIdx}" placeholder="선택한 답을 고른 이유를 구체적으로 작성해주세요."></textarea>
      <div class="char-count" id="char-count-${qIdx}">0자</div>
    `;
    listWrap.appendChild(block);
  });

  // 보기 클릭 이벤트 (이벤트 위임)
  listWrap.querySelectorAll('.choice').forEach(btn => {
    btn.addEventListener('click', () => {
      const qIdx = Number(btn.dataset.q);
      const cIdx = Number(btn.dataset.c);
      answers[qIdx] = cIdx;
      refreshChoiceStyles(qIdx);
    });
  });

  // 이유 입력 이벤트
  QUESTIONS.forEach((q, qIdx) => {
    const ta = document.getElementById(`input-reason-${qIdx}`);
    ta.addEventListener('input', () => {
      reasons[qIdx] = ta.value;
      document.getElementById(`char-count-${qIdx}`).textContent = `${ta.value.length}자`;
    });
  });
}

function refreshChoiceStyles(qIdx){
  const wrap = document.getElementById(`q-choices-${qIdx}`);
  wrap.querySelectorAll('.choice').forEach(btn => {
    const cIdx = Number(btn.dataset.c);
    btn.classList.toggle('selected', answers[qIdx] === cIdx);
  });
}

document.getElementById('btn-submit').addEventListener('click', () => {
  for(let i = 0; i < QUESTIONS.length; i++){
    if(answers[i] === null){
      alert(`문항 ${i + 1}의 답을 선택해주세요.`);
      document.getElementById(`q-choices-${i}`).scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
    if(!reasons[i].trim()){
      alert(`문항 ${i + 1}의 이유를 작성해주세요. (필수 항목입니다)`);
      document.getElementById(`input-reason-${i}`).focus();
      document.getElementById(`input-reason-${i}`).scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
  }
  submitQuiz();
});

function submitQuiz(){
  let correctCount = 0;
  const reviewList = document.getElementById('review-list');
  reviewList.innerHTML = '';

  QUESTIONS.forEach((q, idx) => {
    const isCorrect = answers[idx] === q.answerIndex;
    if(isCorrect) correctCount++;

    const item = document.createElement('div');
    item.className = 'review-item';
    item.innerHTML = `
      <span class="review-tag ${isCorrect ? 'tag-correct' : 'tag-wrong'}">${isCorrect ? '정답' : '오답'}</span>
      <div class="review-q">${q.text}</div>
      <div class="review-block">
        내 답변: <b>${q.choices[answers[idx]]}</b><br>
        ${isCorrect ? '' : `정답: <b>${q.choices[q.answerIndex]}</b>`}
      </div>
      <div class="review-reason">${reasons[idx].trim().replace(/</g,'&lt;')}</div>
    `;
    reviewList.appendChild(item);
  });

  const score = Math.round((correctCount / QUESTIONS.length) * 100);

  screenQuiz.classList.add('hidden');
  screenResult.classList.remove('hidden');
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-sub').textContent = `점 / 100점 만점  (${correctCount} / ${QUESTIONS.length} 문항 정답)`;

  finalScore = score;
  finalCorrectCount = correctCount;

  if(score === 100){
    // 만점: 팝업으로 휴대폰 번호를 입력받은 뒤에 저장
    document.getElementById('coupon-modal-overlay').classList.remove('hidden');
    launchConfetti();
  } else {
    // 만점이 아니면 바로 저장
    saveToSheet(score, correctCount, '');
  }
}

/* =========================================================
   ③ 만점 축하 컨페티 효과 (외부 라이브러리 없이 가벼운 canvas 구현)
   ========================================================= */
function launchConfetti(){
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  function resize(){
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();

  const colors = ['#A50034', '#f4b8c8', '#ffd166', '#4dabf7', '#69db7c'];
  const pieceCount = 140;
  const pieces = [];

  for(let i = 0; i < pieceCount; i++){
    pieces.push({
      x: Math.random() * window.innerWidth,
      y: -20 - Math.random() * window.innerHeight * 0.5,
      size: 6 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      speedY: 2 + Math.random() * 3,
      speedX: (Math.random() - 0.5) * 2,
      rotation: Math.random() * 360,
      rotationSpeed: (Math.random() - 0.5) * 10
    });
  }

  const duration = 2600;
  const startTime = performance.now();

  function frame(now){
    const elapsed = now - startTime;
    ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

    pieces.forEach(p => {
      p.y += p.speedY;
      p.x += p.speedX;
      p.rotation += p.rotationSpeed;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rotation * Math.PI) / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = elapsed > duration - 500 ? Math.max(0, (duration - elapsed) / 500) : 1;
      ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
      ctx.restore();
    });

    if(elapsed < duration){
      requestAnimationFrame(frame);
    } else {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
    }
  }
  requestAnimationFrame(frame);
}

document.getElementById('btn-coupon-submit').addEventListener('click', () => {
  const phoneInput = document.getElementById('input-phone');
  const phone = phoneInput.value.trim();

  if(!phone){
    alert('휴대폰 번호를 입력해주세요.');
    phoneInput.focus();
    return;
  }

  document.getElementById('btn-coupon-submit').disabled = true;
  saveToSheet(finalScore, finalCorrectCount, phone);
});

function saveToSheet(score, correctCount, phone){
  const statusEl = document.getElementById('save-status');

  if(!GAS_WEBAPP_URL || GAS_WEBAPP_URL.indexOf('http') !== 0){
    statusEl.textContent = '※ 결과 저장 URL이 설정되지 않아 시트에 저장되지 않았습니다.';
    return;
  }

  statusEl.textContent = '결과 저장 중...';

  const payload = {
    timestamp: new Date().toISOString(),
    name: userInfo.name,
    empno: userInfo.empno,
    score: score,
    correctCount: correctCount,
    totalCount: QUESTIONS.length,
    couponEligible: score === 100,
    phone: phone || '',
    answers: QUESTIONS.map((q, idx) => ({
      question: q.text,
      selected: q.choices[answers[idx]],
      correct: q.choices[q.answerIndex],
      isCorrect: answers[idx] === q.answerIndex,
      reason: reasons[idx]
    }))
  };

  // GAS 웹앱 CORS preflight 회피를 위해 text/plain으로 전송
  fetch(GAS_WEBAPP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload)
  })
  .then(res => res.json())
  .then(data => {
    statusEl.textContent = data.ok ? '결과가 저장되었습니다.' : '저장 중 오류가 발생했습니다.';
    if(score === 100){
      document.getElementById('coupon-modal-overlay').classList.add('hidden');
      if(data.ok){
        statusEl.textContent = '결과가 저장되었습니다. 쿠폰 신청도 완료되어, 담당자가 확인 후 발송해드립니다.';
      }
    }
  })
  .catch(() => {
    statusEl.textContent = '저장 중 오류가 발생했습니다. (네트워크 확인 필요)';
  });
}
</script>

</body>
</html>
